<mat-toolbar color="primary">
  <span>Hello World</span>
  <span class="spacer"></span>
  <span class="status-text">Backend says: {{ greeting() }}</span>
</mat-toolbar>

<div class="main-content">

  <mat-divider class="section-divider"></mat-divider>

  <h2 class="section-title">NgRx Syntax Examples</h2>
  <div style="margin-bottom: 20px;">
    <button mat-raised-button routerLink="/" color="primary" style="margin-right: 10px;">Home</button>
    <button mat-raised-button routerLink="/users" color="primary" style="margin-right: 10px;">Users</button>
    <button mat-raised-button routerLink="/new-syntax" color="accent" style="margin-right: 10px;">New Syntax</button>
    <button mat-raised-button routerLink="/new-syntax/shallow" color="accent" style="margin-right: 10px;">Shallow Parent</button>
    <button mat-raised-button routerLink="/old-syntax" color="accent" style="margin-right: 10px;">Old Syntax</button>
    <button mat-raised-button routerLink="/legacy-feature" color="primary" style="margin-right: 10px;">Legacy Feature</button>
    <button mat-raised-button routerLink="/legacy-feature-standalone" color="primary" style="margin-right: 10px;">Standalone Feature</button>
    <button mat-raised-button routerLink="/dialog-demo" color="warn">Dialog Demo</button>
  </div>
  
  <div style="padding: 15px; border: 3px solid #fbc02d; background: #fffde7; margin-bottom: 20px;">
    <h1 style="margin: 0 0 10px 0;">Zone.js Verification Area</h1>
    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
      <app-legacy-timer></app-legacy-timer>
      <app-zone-advanced></app-zone-advanced>
    </div>
  </div>

  <div style="padding: 15px; border: 1px dashed #ccc; border-radius: 4px;">
    <router-outlet></router-outlet>
  </div>

</div>
