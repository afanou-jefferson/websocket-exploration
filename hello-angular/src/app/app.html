<mat-toolbar color="primary">
  <span>Hello World</span>
  <span class="spacer"></span>
  <span class="status-text">Backend says: {{ greeting() }}</span>
</mat-toolbar>

<div class="main-content">
  <mat-card class="users-card">
    <mat-card-header>
      <mat-card-title>Users</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-list>
        @for (user of users(); track user.id) {
          <mat-list-item>
            <span matListItemTitle>{{ user.name }}</span>
            <span matListItemLine>
              @if (user.profession) {
                <span>{{ user.profession }}</span>
              } @else {
                <span style="color: #888; font-style: italic;">Hidden</span>
              }
            </span>
            @if (!user.profession) {
              <button mat-stroked-button matListItemMeta color="accent" (click)="fetchProfession(user)">Show</button>
            }
          </mat-list-item>
        }
      </mat-list>
    </mat-card-content>
  </mat-card>

  <mat-divider class="section-divider"></mat-divider>

  <h2 class="section-title">Pure Websocket Chat Components</h2>
  <div class="chat-row">
    <app-chat identity="Pure Websocket Component A"></app-chat>
    <app-chat identity="Pure Websocket Component B"></app-chat>
  </div>

  <mat-divider class="section-divider"></mat-divider>

  <h2 class="section-title">STOMP Chat Components</h2>
  <div class="chat-row">
    <app-chat-stomp identity="STOMP Component A"></app-chat-stomp>
    <app-chat-stomp identity="STOMP Component B"></app-chat-stomp>
  </div>
</div>
